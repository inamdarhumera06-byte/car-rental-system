{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Cars</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-100 via-white to-blue-100 min-h-screen">

<div class="max-w-7xl mx-auto p-6">

    <!-- HEADER -->
    <h1 class="text-4xl font-bold text-center mb-8">
        🚗 Available Cars
    </h1>

    <!-- SEARCH BAR -->
    <form method="GET" class="flex justify-center gap-3 mb-10">

        <input type="text" name="q"
               placeholder="Search your dream car..."
               value="{{ request.GET.q }}"
               class="px-4 py-3 w-72 rounded-xl border shadow-sm focus:ring-2 focus:ring-indigo-400">

        <button class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-6 py-3 rounded-xl shadow-md hover:scale-105 transition">
            Search
        </button>

    </form>
    <!-- CAR GRID -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

        {% for car in cars %}
        <div class="glass rounded-2xl shadow-lg overflow-hidden hover:scale-105 transition duration-300">

            <!-- IMAGE -->
            <div class="overflow-hidden">
                <img src="{{ car.image.url }}"
                     class="w-full h-52 object-cover hover:scale-110 transition duration-500">
            </div>

            <!-- CONTENT -->
            <div class="p-5">

                <h2 class="text-xl font-semibold">{{ car.name }}</h2>

                <p class="text-indigo-600 font-bold mt-1">
                    ₹{{ car.price }} / day
                </p>
                <div class="flex items-center mt-2">
    
</div>

                <p class="text-gray-600 text-sm mt-1">
                    {{ car.fuel }} • {{ car.passengers }} Seats
                </p>
                <p class="text-gray-600 text-sm mt-1">
                    {{ car.city }}
                </p>

                <!-- STATUS -->
                <p class="text-green-500 text-sm mt-2 font-medium">
                    ✔ Available
                </p>

                <!-- BUTTONS -->
                <div class="flex gap-3 mt-4">

                    <a href="{% url 'car_detail' car.id %}"
                       class="flex-1 text-center bg-gray-800 text-white py-2 rounded-lg hover:bg-black transition">
                        View
                    </a>

                    <a href="{% url 'book_car' car.id %}"
                       class="flex-1 text-center bg-gradient-to-r from-indigo-500 to-purple-500 text-white py-2 rounded-lg hover:opacity-90 transition">
                        Book
                    </a>

                </div>

            </div>

        </div>
        {% empty %}
        <p class="text-center col-span-3 text-gray-500">
            No cars found 😔
        </p>
        {% endfor %}

    </div>

</div>

</body>
</html>
